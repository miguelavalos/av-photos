name: AVPhotos
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    DEVELOPMENT_LANGUAGE: en
    PRODUCT_NAME: AV Photos
    SWIFT_VERSION: "6.0"

packages:
  Clerk:
    url: https://github.com/clerk/clerk-ios
    from: 1.0.0

schemes:
  AVPhotos:
    build:
      targets:
        AVPhotos: all
    run:
      config: Debug
      executable: AVPhotos
    analyze:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
    management:
      shared: true

targets:
  AVPhotos:
    type: application
    platform: iOS
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    sources:
      - path: AVPhotos
    dependencies:
      - package: Clerk
        product: ClerkKit
      - package: Clerk
        product: ClerkKitUI
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        INFOPLIST_FILE: AVPhotos/App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
